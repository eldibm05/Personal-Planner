<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADE PLANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Pure JS: constants, utilities, state, scheduling logic -->
<script src="js/constants.js"></script>
<script src="js/audio.js"></script>
<script src="js/helpers.js"></script>
<script src="js/state.js"></script>
<script src="js/prayerTimes.js"></script>
<script src="js/scheduler.js"></script>

<!-- React components (JSX, processed by Babel) -->
<script type="text/babel" data-presets="react" src="js/components/ui.js"></script>
<script type="text/babel" data-presets="react" src="js/components/forms.js"></script>
<script type="text/babel" data-presets="react" src="js/components/ProjectsTab.js"></script>
<script type="text/babel" data-presets="react" src="js/components/CalendarTab.js"></script>
<script type="text/babel" data-presets="react" src="js/components/AnalyticsTab.js"></script>
<script type="text/babel" data-presets="react" src="js/components/NowBar.js"></script>
<script type="text/babel" data-presets="react" src="js/components/Settings.js"></script>
<script type="text/babel" data-presets="react" src="js/components/LoginScreen.js"></script>
<script type="text/babel" data-presets="react" src="js/components/App.js"></script>

</body>
</html>
